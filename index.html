<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Color Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(124,109,250,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(124,109,250,0.05);
  }

  .upload-icon {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .upload-zone h2 {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .upload-zone p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
  }

  .upload-zone .formats {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .format-tag {
    background: var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
  }

  #fileInput { display: none; }

  /* Validation messages */
  .validation-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    text-align: left;
  }

  .validation-msg.error {
    background: rgba(250, 80, 80, 0.1);
    border: 1px solid rgba(250, 80, 80, 0.3);
    color: #fa8080;
    display: block;
  }

  .validation-msg.warning {
    background: rgba(250, 180, 50, 0.1);
    border: 1px solid rgba(250, 180, 50, 0.3);
    color: #fab432;
    display: block;
  }

  /* Results */
  .results {
    display: none;
    margin-top: 40px;
    gap: 32px;
    grid-template-columns: 1fr 1.4fr;
  }

  .results.visible {
    display: grid;
  }

  .result-image {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .result-image { min-height: 420px; }

  .result-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .result-chart {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    border: 1px solid var(--border);
  }

  .chart-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chart-title span {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 400;
  }

  .bar-row {
    margin-bottom: 14px;
  }

  .bar-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }

  .bar-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .bar-pct {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 700;
  }

  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .loading.visible { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Image info bar */
  .image-info {
    display: none;
    margin-top: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    gap: 24px;
  }

  .image-info.visible {
    display: flex;
    flex-wrap: wrap;
  }

  .info-item strong {
    color: var(--text);
  }

  canvas { display: none; }

  .analyze-btn {
    display: none;
    margin-top: 20px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }

  .analyze-btn:hover { opacity: 0.9; }
  .analyze-btn.visible { display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Color Analyzer</h1>
    <p>PIXEL-LEVEL COLOR DISTRIBUTION · 11 COLOR CATEGORIES</p>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📁</div>
    <h2>Drop your image here</h2>
    <p>or click to browse</p>
    <div class="formats">
      <span class="format-tag">JPEG</span>
      <span class="format-tag">PNG</span>
      <span class="format-tag">WebP</span>
      <span class="format-tag">BMP</span>
    </div>
    <p style="margin-top:12px; font-size:0.7rem;">Min: 100×100px &nbsp;|&nbsp; Max: 25MB</p>
  </div>
  <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.bmp">

  <div class="validation-msg" id="validationMsg"></div>

  <div class="image-info" id="imageInfo">
    <div class="info-item">File: <strong id="infoName">—</strong></div>
    <div class="info-item">Size: <strong id="infoSize">—</strong></div>
    <div class="info-item">Resolution: <strong id="infoDims">—</strong></div>
    <div class="info-item">Format: <strong id="infoFormat">—</strong></div>
  </div>

  <button class="analyze-btn" id="analyzeBtn">▶ &nbsp;Analyze Colors</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Analyzing pixels...
  </div>

  <div class="results" id="results">
    <div class="result-image">
      <img id="previewImg" src="" alt="Uploaded image">
    </div>
    <div class="result-chart">
      <div class="chart-title">
        Color Distribution <span id="pixelCount"></span>
      </div>
      <div id="barsContainer"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>
</div>

<script>
// ── Color definitions ────────────────────────────────────────────────
const COLOR_META = {
  Black:  "#1a1a1a",
  White:  "#f5f5f5",
  Gray:   "#888888",
  Red:    "#cc2200",
  Orange: "#e87820",
  Yellow: "#e8c800",
  Green:  "#2e8b2e",
  Blue:   "#1e5fa8",
  Purple: "#7b3fa0",
  Pink:   "#e8609a",
  Brown:  "#8b5e3c",
};

// ── RGB → HSV ────────────────────────────────────────────────────────
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0, s = max === 0 ? 0 : d / max, v = max;
  if (d !== 0) {
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [h * 360, s, v];
}

// ── Classify pixel ───────────────────────────────────────────────────
function classifyPixel(r, g, b) {
  const [hd, s, v] = rgbToHsv(r, g, b);

  // Gate 1: Achromatic
  if (s < 0.12) {
    if (v < 0.20) return "Black";
    if (v > 0.80) return "White";
    return "Gray";
  }

  // Gate 2: Very dark
  if (v < 0.12) return "Black";

  // Gate 3: Pastel detection — low saturation but detectable hue
  // Fixes pale pink, baby blue, mint, lavender, peach being misclassified as White/Gray
  if (s >= 0.06 && s < 0.15 && v > 0.72) {
    if (hd >= 310 || hd < 10)  return "Pink";
    if (hd >= 10  && hd < 38)  return "Orange";
    if (hd >= 38  && hd < 70)  return "Yellow";
    if (hd >= 70  && hd < 165) return "Green";
    if (hd >= 165 && hd < 265) return "Blue";
    if (hd >= 265 && hd < 310) return "Purple";
  }

  // Gate 4: Brown trap (warm hues, low-moderate sat/val)
  if ((hd < 50 || hd >= 330) && s < 0.65 && v < 0.72) return "Brown";

  // Hue-based
  if (hd < 10 || hd >= 340) return "Red";
  if (hd < 38)  return (s >= 0.55 && v >= 0.55) ? "Orange" : "Brown";
  if (hd < 70)  return (s >= 0.35 && v >= 0.55) ? "Yellow" : "Brown";
  if (hd < 165) {
    if (v < 0.20) return "Black";
    if (s < 0.15) return "Gray";
    return "Green";
  }
  if (hd < 265) return "Blue";
  if (hd < 310) return "Purple";
  if (hd < 340) return v < 0.35 ? "Purple" : "Pink";
  return "Gray";
}

// ── Validation ───────────────────────────────────────────────────────
const ACCEPTED_TYPES = ['image/jpeg','image/png','image/webp','image/bmp'];
const MAX_SIZE_MB = 25;
const MIN_DIM = 100;

function showMsg(msg, type) {
  const el = document.getElementById('validationMsg');
  el.textContent = msg;
  el.className = `validation-msg ${type}`;
}

function hideMsg() {
  const el = document.getElementById('validationMsg');
  el.className = 'validation-msg';
}

// ── State ────────────────────────────────────────────────────────────
let currentFile = null;
let currentImage = null;

// ── Upload handling ──────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  hideMsg();
  document.getElementById('results').classList.remove('visible');
  document.getElementById('analyzeBtn').classList.remove('visible');
  document.getElementById('imageInfo').classList.remove('visible');

  // Gate 1 — Format
  if (!ACCEPTED_TYPES.includes(file.type)) {
    showMsg('❌ Unsupported format. Please upload a JPEG, PNG, WebP, or BMP file.', 'error');
    return;
  }

  // Gate 2 — File size (max)
  if (file.size > MAX_SIZE_MB * 1024 * 1024) {
    showMsg('❌ File too large (max 25MB). Please compress or resize the image.', 'error');
    return;
  }

  currentFile = file;

  // Load image to check dimensions
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Gate 2c — Resolution
      if (img.width < MIN_DIM || img.height < MIN_DIM) {
        showMsg(`❌ Image too small (${img.width}×${img.height}px). Minimum is 100×100px.`, 'error');
        return;
      }

      currentImage = img;

      // Gate 3 — Quality warning (soft)
      const qualityWarn = checkQuality(img);
      if (qualityWarn) showMsg('⚠️ ' + qualityWarn, 'warning');

      // Show image info bar
      document.getElementById('infoName').textContent = file.name;
      document.getElementById('infoSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
      document.getElementById('infoDims').textContent = `${img.width} × ${img.height} px`;
      document.getElementById('infoFormat').textContent = file.type.split('/')[1].toUpperCase();
      document.getElementById('imageInfo').classList.add('visible');

      // Show preview & analyze button
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('analyzeBtn').classList.add('visible');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Gate 3: Quality check ────────────────────────────────────────────
function checkQuality(img) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const size = 50;
  canvas.width = size; canvas.height = size;
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;

  let totalR = 0, totalG = 0, totalB = 0, n = size * size;
  for (let i = 0; i < data.length; i += 4) {
    totalR += data[i]; totalG += data[i+1]; totalB += data[i+2];
  }
  const avgR = totalR/n, avgG = totalG/n, avgB = totalB/n;
  const avg = (avgR + avgG + avgB) / 3;

  // Fully black or white
  if (avg < 10)  return "Image appears fully black — may be corrupt. Results may be inaccurate.";
  if (avg > 245) return "Image appears fully white — may be corrupt. Results may be inaccurate.";

  // Check variance (low variance = very flat/washed out)
  let variance = 0;
  for (let i = 0; i < data.length; i += 4) {
    const px = (data[i] + data[i+1] + data[i+2]) / 3;
    variance += (px - avg) ** 2;
  }
  variance /= n;
  if (variance < 100) return "Low contrast image detected — color results may be less accurate.";

  return null;
}

// ── Analyze ──────────────────────────────────────────────────────────
document.getElementById('analyzeBtn').addEventListener('click', () => {
  if (!currentImage) return;
  document.getElementById('analyzeBtn').classList.remove('visible');
  document.getElementById('loading').classList.add('visible');
  document.getElementById('results').classList.remove('visible');

  setTimeout(() => analyzeImage(currentImage), 50);
});

function analyzeImage(img) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Downsample to max 400px
  let w = img.width, h = img.height;
  const maxDim = 400;
  if (w > maxDim || h > maxDim) {
    const ratio = Math.min(maxDim/w, maxDim/h);
    w = Math.round(w * ratio);
    h = Math.round(h * ratio);
  }

  canvas.width = w; canvas.height = h;
  ctx.drawImage(img, 0, 0, w, h);
  const data = ctx.getImageData(0, 0, w, h).data;

  const counts = {};
  Object.keys(COLOR_META).forEach(k => counts[k] = 0);
  const total = w * h;

  for (let i = 0; i < data.length; i += 4) {
    const label = classifyPixel(data[i], data[i+1], data[i+2]);
    counts[label]++;
  }

  // Sort descending, remove zeros
  const sorted = Object.entries(counts)
    .filter(([,v]) => v > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([k, v]) => [k, parseFloat((v / total * 100).toFixed(2))]);

  renderChart(sorted, total);

  document.getElementById('loading').classList.remove('visible');
  document.getElementById('results').classList.add('visible');
}

// ── Render chart ─────────────────────────────────────────────────────
function renderChart(sorted, total) {
  document.getElementById('pixelCount').textContent =
    `· ${total.toLocaleString()} pixels analyzed`;

  const container = document.getElementById('barsContainer');
  container.innerHTML = '';

  sorted.forEach(([label, pct]) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label-row">
        <div class="bar-label">
          <div class="color-dot" style="background:${COLOR_META[label]}"></div>
          ${label}
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="background:${COLOR_META[label]}; width:0%"
             data-target="${pct}"></div>
      </div>`;
    container.appendChild(row);
  });

  // Animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  });
}
</script>
</body>
</html>
